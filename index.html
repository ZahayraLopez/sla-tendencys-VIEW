let active="base";

function badge(type,text){
  return `<span class="v ${type}">${text}</span>`;
}

function renderSidebar(){
  const sb=document.getElementById("sidebar");
  sb.innerHTML=departments.map(d=>`
    <button onclick="setActive('${d.id}')" class="${d.id===active?'active':''}">
      <span>${d.icon}</span><span>${d.label}</span>
    </button>`).join("");
}

function renderMain(q=""){
  const dept=data[active];
  const info=departments.find(d=>d.id===active);
  document.getElementById("dh-num").textContent=`${info.icon} ${active.toUpperCase()}`;
  document.getElementById("dh-title").textContent=dept.title;
  document.getElementById("dh-sub").textContent=dept.subtitle||"";

  // KPIs
  const kpiDiv=document.getElementById("kpis");
  kpiDiv.innerHTML=dept.kpis?dept.kpis.map(k=>`
    <div class="kpi-box">
      <div class="ki">${k.icon}</div>
      <div class="kv">${k.val}</div>
      <div class="kl">${k.lbl}</div>
    </div>`).join(""):"";

  // Notes
  const notesDiv=document.getElementById("notes");
  const notesList=document.getElementById("notes-list");
  if(dept.notes&&!q){
    notesList.innerHTML=dept.notes.map(n=>`<li>${n}</li>`).join("");
    notesDiv.style.display="block";
  } else {
    notesDiv.style.display="none";
  }

  // Sections
  const ql=q.toLowerCase();
  const filtered=dept.sections.map(s=>({
    ...s,
    rows:q?s.rows.filter(r=>r[0].toLowerCase().includes(ql)||r[1].toLowerCase().includes(ql)):s.rows
  })).filter(s=>s.rows.length>0);

  const secDiv=document.getElementById("sections");
  const noRes=document.getElementById("no-results");

  if(filtered.length===0){
    secDiv.innerHTML="";
    noRes.style.display="block";
    noRes.textContent=`No se encontraron resultados para "${q}"`;
  } else {
    noRes.style.display="none";
    secDiv.innerHTML=filtered.map(sec=>`
      <div class="sec-title">${sec.title}</div>
      <table>
        <thead><tr><th>Proceso / Métrica</th><th style="width:44%">Tiempo / Meta</th></tr></thead>
        <tbody>${sec.rows.map(r=>`<tr><td>${r[0]}</td><td>${badge(r[2],r[1])}</td></tr>`).join("")}</tbody>
      </table>`).join("");
  }
}

function setActive(id){
  active=id;
  document.getElementById("search").value="";
  renderSidebar();
  renderMain();
}

document.getElementById("search").addEventListener("input",function(){
  renderMain(this.value);
});

renderSidebar();
renderMain();
</script>
